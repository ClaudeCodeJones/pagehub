<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PageHub — PDF Toolkit</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; background: #1E1B4B; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1E1B4B;
      color: #0F172A;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }

    /* ── NAVBAR ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: 64px;
      background: #1E1B4B;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 48px;
      border-bottom: 1px solid rgba(129, 140, 248, 0.12);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-brand img {
      height: 30px;
      display: block;
    }

    .nav-brand-name {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.2px;
    }

    .nav-launch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 22px;
      background: #F59E0B;
      color: #1E1B4B;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      border-radius: 8px;
      transition: background 140ms ease, box-shadow 140ms ease, transform 60ms ease;
      box-shadow: 0 2px 8px rgba(245, 158, 11, 0.35);
    }
    .nav-launch:hover {
      background: #FBBF24;
      box-shadow: 0 4px 16px rgba(245, 158, 11, 0.45);
    }
    .nav-launch:active { transform: scale(0.975); }

    /* ── HERO ── */
    .hero {
      min-height: auto;
      padding: 80px 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;

      background-color: #1E1B4B;
      background-image:
        /* Indigo glow — upper left */
        radial-gradient(ellipse at 25% 15%, rgba(79, 70, 229, 0.5) 0%, transparent 55%),
        /* Lavender hint — lower right */
        radial-gradient(ellipse at 80% 85%, rgba(129, 140, 248, 0.18) 0%, transparent 50%),
        /* Dot grid */
        radial-gradient(rgba(255, 255, 255, 0.13) 1px, transparent 1px);
      background-size:
        100% 100%,
        100% 100%,
        28px 28px;
    }

    .hero-inner {
      max-width: 760px;
      padding: 0;
    }

    .hero-eyebrow {
      display: inline-block;
      margin-bottom: 1rem;
      padding: 10px 32px;
      border-radius: 100px;
      border: 1px solid rgba(129, 140, 248, 0.3);
      background: rgba(129, 140, 248, 0.1);
      color: #818CF8;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .hero-headline {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 88px;
      font-weight: 800;
      color: #fff;
      line-height: 1.07;
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
    }

    .hero-sub {
      font-size: 20px;
      color: #818CF8;
      line-height: 1.55;
      margin-bottom: 1.5rem;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 18px 44px;
      background: #F59E0B;
      color: #1E1B4B;
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 700;
      border-radius: 100px;
      transition: background 140ms ease, box-shadow 140ms ease, transform 100ms ease;
      box-shadow: 0 4px 24px rgba(245, 158, 11, 0.38);
      letter-spacing: -0.1px;
    }
    .hero-cta:hover {
      background: #FBBF24;
      box-shadow: 0 8px 32px rgba(245, 158, 11, 0.50);
      transform: translateY(-2px);
    }
    .hero-cta:active {
      transform: translateY(0) scale(0.975);
    }

    /* ── TOOLS ── */
    .tools {
      padding: 88px 48px 80px;
      background: #F8FAFC;
    }

    .tools-heading {
      text-align: center;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: #1E1B4B;
      letter-spacing: -0.025em;
      margin-bottom: 12px;
    }

    .tools-sub {
      text-align: center;
      font-size: 16px;
      color: #64748B;
      margin-bottom: 52px;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .tool-card {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      padding: 22px 18px 18px;
      transition: box-shadow 160ms ease, transform 160ms ease, border-color 160ms ease;
      cursor: default;
    }
    .tool-card:hover {
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.09), 0 2px 6px rgba(0, 0, 0, 0.04);
      transform: translateY(-2px);
      border-color: rgba(129, 140, 248, 0.4);
    }

    .tool-icon {
      font-size: 22px;
      line-height: 1;
      margin-bottom: 12px;
      display: block;
    }

    .tool-name {
      font-size: 14px;
      font-weight: 700;
      color: #0F172A;
      margin-bottom: 5px;
      letter-spacing: -0.1px;
    }

    .tool-desc {
      font-size: 12.5px;
      color: #64748B;
      line-height: 1.5;
    }

    /* ── FOOTER ── */
    .footer {
      padding: 28px 24px;
      background: #1E1B4B;
      text-align: center;
      color: rgba(255, 255, 255, 0.35);
      font-size: 13px;
      letter-spacing: 0.1px;
    }

    /* ── TOOLS BAND ── */
    .tools-band {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      background: #1E1B4B;
      height: 52px;
    }
    .tools-band-item {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.1);
      padding: 0 4px;
    }
    .tools-band-item:last-child { border-right: none; }
    .tools-band-item:nth-child(odd)  { color: #F8FAFC; }
    .tools-band-item:nth-child(even) { color: #F59E0B; }
    .tools-band-link {
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    .tools-band-link:hover { opacity: 0.75; }

    /* ── MOBILE BLOCK ── */
    .mobile-block {
      display: none;
      position: fixed;
      inset: 0;
      background: #1E1B4B;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1.5rem;
      z-index: 9999;
    }
    .mobile-block img { height: 48px; width: auto; }
    .mobile-block h2 {
      color: #F8FAFC;
      font-size: 20px;
      font-weight: 600;
      margin: 0;
    }
    .mobile-block p {
      color: #818CF8;
      font-size: 15px;
      margin: 0;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      body > * { display: none !important; }
      .mobile-block { display: flex !important; }
    }
  </style>
</head>
<body>

  <!-- ── HERO ─────────────────────────────────────────────────────────────── -->
  <section class="hero">
    <div class="hero-inner">
      <img src="/logos/pagehub_logo_white.webp" alt="PageHub"
        style="height: 120px; width: auto; margin-bottom: 1.5rem; display: block; margin-left: auto; margin-right: auto;">
      <span class="hero-eyebrow">PDF Toolkit · 10 Tools</span>
      <h1 class="hero-headline">
        Every PDF<br />tool <span style="color:#F59E0B">you</span> need.
      </h1>
      <p class="hero-sub">
        Merge, split, redact and more — all in your browser.
      </p>
      <a href="/app" class="hero-cta">Launch PageHub →</a>
    </div>
  </section>

  <!-- ── TOOLS BAND ────────────────────────────────────────────────────────── -->
  <div class="tools-band">
    <span class="tools-band-item"><a class="tools-band-link" href="/app#merge">Merge PDFs</a></span>
    <span class="tools-band-item"><a class="tools-band-link" href="/app#split">Split PDF</a></span>
    <span class="tools-band-item"><a class="tools-band-link" href="/app#rotate">Rotate Pages</a></span>
    <span class="tools-band-item"><a class="tools-band-link" href="/app#pagenumbers">Page Numbers</a></span>
    <span class="tools-band-item"><a class="tools-band-link" href="/app#headerfooter">Headers &amp; Footers</a></span>
    <span class="tools-band-item"><a class="tools-band-link" href="/app#watermark">Watermark</a></span>
    <span class="tools-band-item"><a class="tools-band-link" href="/app#compress">Compress PDF</a></span>
    <span class="tools-band-item"><a class="tools-band-link" href="/app#redact">Redact</a></span>
    <span class="tools-band-item"><a class="tools-band-link" href="/app#formfiller">Form Filler</a></span>
    <span class="tools-band-item"><a class="tools-band-link" href="/app#pdfinfo">PDF Info</a></span>
  </div>

  <!-- ── FOOTER ────────────────────────────────────────────────────────────── -->
  <footer class="footer">
    <img src="/logos/mwgroup_logo.webp" alt="MW Group"
      style="height: 24px; width: auto; opacity: 0.85; display: inline-block; vertical-align: middle; margin-right: 8px;">
    &mdash; Built for internal use
  </footer>


</body>
</html>
